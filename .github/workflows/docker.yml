name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'bun.lock'
      - 'scripts/build-server.mjs'
      - 'src/**'
      - '.github/workflows/docker.yml'

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: largo-webapp:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke test container boot
        run: |
          set -euo pipefail
          docker run --rm -d --name largo-smoke \
            -e PORT=3000 \
            -e ALLOW_REMOTE=true \
            -e NODE_ENV=production \
            -p 3000:3000 \
            largo-webapp:ci
          # Give the server a few seconds to start
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3000/ >/dev/null 2>&1; then
              echo "Server answered on port 3000."
              docker logs largo-smoke || true
              docker stop largo-smoke >/dev/null
              exit 0
            fi
            sleep 1
          done
          echo "Server did not respond within 30s." >&2
          docker logs largo-smoke || true
          docker stop largo-smoke >/dev/null || true
          exit 1
