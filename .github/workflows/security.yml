name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Re-scan main every Monday 03:00 UTC to catch new advisories against
    # code that hasn't changed recently.
    - cron: '0 3 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The ADR 0006 policy: fail fast on committed secrets.
          GITLEAKS_ENABLE_COMMENTS: 'true'
          GITLEAKS_ENABLE_SUMMARY: 'true'

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          # Curated rulesets: OWASP top 10, TS/JS security, secrets. See ADR 0006.
          config: >-
            p/owasp-top-ten
            p/typescript
            p/javascript
            p/secrets

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies (no scripts)
        run: bun install --ignore-scripts
      - name: bun audit
        # bun audit is advisory today — we track high/critical separately via
        # Dependabot (see .github/dependabot.yml).
        run: bun audit --audit-level=high || true
