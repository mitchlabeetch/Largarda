name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Lint (oxlint)
        run: bun run lint
      - name: Format check (oxfmt)
        run: bun run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Typecheck (tsc --noEmit)
        run: bunx tsc --noEmit

  i18n:
    name: i18n Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Regenerate i18n types
        run: bun run i18n:types
      - name: Validate i18n
        run: node scripts/check-i18n.js

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Run tests with coverage
        run: bunx vitest run --coverage
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage
          if-no-files-found: ignore
          retention-days: 7

  build-webui:
    name: Build WebUI bundle
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --ignore-scripts
      - name: Build renderer (web)
        run: bun run build:renderer:web
      - name: Build server bundle
        run: bun run build:server
      - name: Upload web artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: |
            out/renderer
            dist-server
          if-no-files-found: warn
          retention-days: 7
